default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [ low, default, notify ]
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.5
  scheduler:
    dynamic_tasks_enabled: false
    polling_interval: 5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
