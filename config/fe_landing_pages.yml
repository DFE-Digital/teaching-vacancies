  ##
  # Configuration for FE (Further Education) landing pages.
  # All entries here automatically get organisation_types: [Colleges] applied.
  # See config/application.rb for how this file is merged into the main landing_pages config.
  # See config/landing_pages.yml for non-FE landing pages.
  #
